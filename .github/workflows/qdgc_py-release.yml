name: qdgc_py release

# Builds and publishes qdgc-py to PyPI when a version tag is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) - no API tokens or secrets.
# One-time setup on PyPI (pypi.org -> your project -> Publishing):
#   - Owner:            ragnvald
#   - Repository:       qdgc
#   - Workflow name:    qdgc_py-release.yml
#   - Environment name: pypi
#
# Release flow:
#   1. Bump qdgc_py/pyproject.toml project.version (e.g. 0.1.1)
#   2. git tag v0.1.1 && git push origin v0.1.1

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        working-directory: qdgc_py
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e '.[dev]'

      - name: Run tests (release gate)
        working-directory: qdgc_py
        run: pytest -q

      - name: Build sdist and wheel
        working-directory: qdgc_py
        run: python -m build

      - name: Validate metadata
        working-directory: qdgc_py
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: qdgc_py/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
