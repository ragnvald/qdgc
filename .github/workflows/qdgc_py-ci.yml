name: qdgc_py CI

on:
  push:
    paths:
      - "qdgc_py/**"
      - "qdgc_py_legacy/tools/qdgc_lib.py"
      - ".github/workflows/qdgc_py-ci.yml"
  pull_request:
    paths:
      - "qdgc_py/**"
      - "qdgc_py_legacy/tools/qdgc_lib.py"
      - ".github/workflows/qdgc_py-ci.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and test dependencies
        working-directory: qdgc_py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        working-directory: qdgc_py
        run: pytest -q
